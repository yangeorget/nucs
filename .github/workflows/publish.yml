name: publish
on:
    release:
        types: [ created ]
jobs:
    publish-nucs-to-pypi:
        name: Publish NUCS to PyPI
        runs-on: ubuntu-latest
        environment:
            name: pypi
            url: https://pypi.org/p/nucs
        permissions:
            id-token: write
        steps:
            -   uses: actions/checkout@v6
            -   name: Set up Python
                uses: actions/setup-python@v6
                with:
                    python-version: "3.14"
            -   name: Install dependencies
                run: |
                    python -m pip install --upgrade pip
                    pip install build
            -   name: Build package
                run: |
                    python -m build
            -   name: Publish to PyPI
                uses: pypa/gh-action-pypi-publish@release/v1

    publish-docker-image:
        name: Build and publish the Docker image
        runs-on: ubuntu-latest  # native amd64: warms the Numba cache for the architecture EC2 runs on
        steps:
            -   uses: actions/checkout@v6
                with:
                    ref: ${{ github.event.release.tag_name }}
            -   name: Compute image version (strip a leading "v" from the release tag)
                id: version
                env:
                    TAG: ${{ github.event.release.tag_name }}
                run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@v3
            -   name: Log in to Docker Hub
                uses: docker/login-action@v3
                with:
                    username: ${{ secrets.DOCKERHUB_USERNAME }}
                    password: ${{ secrets.DOCKERHUB_TOKEN }}
            -   name: Build and push the image
                uses: docker/build-push-action@v6
                with:
                    context: .
                    platforms: linux/amd64  # the minizinc/mznc2026 base is amd64-only
                    push: true
                    tags: |
                        ${{ secrets.DOCKERHUB_USERNAME }}/minizinc-nucs:${{ steps.version.outputs.version }}
                        ${{ secrets.DOCKERHUB_USERNAME }}/minizinc-nucs:latest